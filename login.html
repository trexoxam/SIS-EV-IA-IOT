<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIAS - Iniciar Sesión</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/estilo.css') }}">
</head>
<body>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Iniciar Sesión</h2>
            <p class="auth-subtitle">Ingresa tus datos para acceder al sistema AIAS</p>

            <div id="errorMessage" class="alert-message hidden"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                        <button type="button" id="togglePassword" class="btn-secondary">👁️ Ver</button>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Entrar al Sistema</button>
            </form>

            <div class="auth-footer">
                <p>¿No tienes una cuenta? <a href="/registro">Regístrate aquí</a></p>

<p><a href="/">← Volver al Chat Público</a></p>
            </div>
        </div>
    </main>
<script src="{{ url_for('static', filename='js/autenticacion.js') }}"></script></body>
</html>
