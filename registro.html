<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIAS - Crear Cuenta</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/estilo.css') }}">
</head>
<body>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Crear Cuenta</h2>
            <p class="auth-subtitle">Regístrate para guardar tu historial de consultas en AIAS</p>

            <div id="errorMessage" class="alert-message hidden"></div>
            <div id="successMessage" class="alert-success hidden"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName">Nombre Completo:</label>
                    <input type="text" id="fullName" placeholder="Juan Pérez López" required autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" placeholder="Crea una contraseña segura (mín. 6 caracteres)" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña:</label>
                    <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required>
                </div>

                <button type="submit" class="btn-primary">Registrarse</button>
            </form>

            <div class="auth-footer">
                <p>¿Ya tienes una cuenta? <a href="/login">Inicia sesión aquí</a></p>
                <p><a href="/">← Volver al Chat Público</a></p>
            </div>
        </div>
    </main>

<script src="{{ url_for('static', filename='js/autenticacion.js') }}"></script>
</body>
</html>
