<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Evaluación de Entrevista</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/dashboard.css') }}">

</head>

<body>

<div class="sidebar">

    <div class="logo">
        🧠 Exam<span>IA</span>
    </div>

    <div class="menu">

        <a href="{{ url_for('dashboard') }}">
            🏠 Dashboard
        </a>

        <a href="{{ url_for('entrevistas') }}" class="active">
            🎤 Entrevistas
        </a>

    </div>

</div>

<div class="main">

<div class="panel">

<h2>Evaluación del Aspirante</h2>

<form action="{{ url_for('guardar_entrevista') }}" method="POST">

<input
type="hidden"
name="id_usuario"
value="{{ aspirante.id_usuario }}">

<input
type="hidden"
name="id_cita"
value="{{ aspirante.id_cita }}">

<p>

<strong>Nombre:</strong>

{{ aspirante.nombre_completo }}

</p>

<br>

<p>

<strong>Fecha de la cita:</strong>

{{ aspirante.fecha_cita }}

</p>

<br>

<p>

<strong>Examen:</strong>

{{ aspirante.nombre_examen }}

</p>

<br>

<p>

<strong>Calificación del examen:</strong>

{{ aspirante.calificacion }} %

</p>

<br>

<label>

Área

</label>

<select
id="area"
style="width:100%;padding:10px;"
required>

<option value="">

Seleccione un área

</option>

{% for area in areas %}

<option value="{{ area.id_area }}">

{{ area.nombre }}

</option>

{% endfor %}

</select>

<br><br>

<label>

Puesto

</label>

<select
id="puesto"
name="id_puesto"
style="width:100%;padding:10px;"
required>

<option value="">

Seleccione un puesto

</option>

{% for puesto in puestos %}

<option
value="{{ puesto.id_puesto }}"
data-area="{{ puesto.id_area }}"
style="display:none;">

{{ puesto.nombre }}

</option>

{% endfor %}

</select>

<br><br>

<label>

Observaciones

</label>

<textarea
name="observaciones"
rows="6"
style="width:100%;padding:10px;"
required>
</textarea>

<br><br>

<label>

Calificación de la entrevista

</label>

<input
type="number"
name="calificacion"
min="0"
max="100"
required
style="width:150px;padding:10px;">

<br><br>

<div class="acciones">

    <button
        type="submit"
        name="resultado"
        value="Aprobado"
        class="btn-aprobar">

        ✅ Aprobar

    </button>

    <button
        type="submit"
        name="resultado"
        value="Rechazado"
        class="btn-rechazar">

        ❌ Rechazar

    </button>

</div>

</form>

</div>

</div>

<script>

const area = document.getElementById("area");
const puesto = document.getElementById("puesto");

area.addEventListener("change", function(){

    const idArea = this.value;

    puesto.selectedIndex = 0;

    for(let opcion of puesto.options){

        if(opcion.value===""){

            opcion.style.display="block";
            continue;

        }

        if(opcion.dataset.area===idArea){

            opcion.style.display="block";

        }

        else{

            opcion.style.display="none";

        }

    }

});

</script>

</body>

</html>
