<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Resultado del Examen</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #1e3a8a,
        #2563eb
    );

}

.resultado{

    background:white;

    width:100%;

    max-width:550px;

    padding:45px 35px;

    border-radius:25px;

    text-align:center;

    box-shadow:
    0 15px 40px
    rgba(0,0,0,.25);

}

.icono{

    font-size:70px;

    margin-bottom:20px;

}

h1{

    color:#0f172a;

    margin-bottom:10px;

}

.mensaje{

    color:#64748b;

    margin-bottom:30px;

}

.calificacion{

    font-size:60px;

    font-weight:bold;

    color:#2563eb;

    margin:20px 0;

}

.detalles{

    background:#f8fafc;

    padding:20px;

    border-radius:15px;

    margin-bottom:30px;

}

.detalle{

    display:flex;

    justify-content:space-between;

    padding:10px 0;

    border-bottom:1px solid #e2e8f0;

}

.detalle:last-child{

    border-bottom:none;

}

.detalle strong{

    color:#334155;

}

.detalle span{

    color:#2563eb;

    font-weight:bold;

}

.btn{

    display:inline-block;

    padding:14px 28px;

    background:#2563eb;

    color:white;

    text-decoration:none;

    border-radius:12px;

    font-weight:bold;

    transition:.3s;

}

.btn:hover{

    background:#1d4ed8;

}

</style>

</head>

<body>

<div class="resultado">

    <div class="icono">

        🎉

    </div>

    <h1>

        Examen finalizado

    </h1>

    <p class="mensaje">

        Tu examen técnico personalizado ha sido evaluado.

    </p>

    <div class="calificacion">

        {{ "%.2f"|format(calificacion) }}%

    </div>

    <div class="detalles">

        <div class="detalle">

            <strong>Total de preguntas</strong>

            <span>

                {{ total_preguntas }}

            </span>

        </div>

        <div class="detalle">

            <strong>Respuestas correctas</strong>

            <span>

                {{ respuestas_correctas }}

            </span>

        </div>

    </div>

    <a
        href="{{ url_for('agenda') }}"
        class="btn">

        Volver a mi agenda

    </a>

</div>

</body>

</html>
